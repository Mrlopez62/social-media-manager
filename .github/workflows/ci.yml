name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DISABLE_RATE_LIMITS: ${{ vars.DISABLE_RATE_LIMITS || 'false' }}
  RATE_LIMIT_AUTH_LOGIN_MAX: ${{ vars.RATE_LIMIT_AUTH_LOGIN_MAX || '8' }}
  RATE_LIMIT_AUTH_LOGIN_WINDOW_SECONDS: ${{ vars.RATE_LIMIT_AUTH_LOGIN_WINDOW_SECONDS || '60' }}
  RATE_LIMIT_AUTH_SIGNUP_MAX: ${{ vars.RATE_LIMIT_AUTH_SIGNUP_MAX || '4' }}
  RATE_LIMIT_AUTH_SIGNUP_WINDOW_SECONDS: ${{ vars.RATE_LIMIT_AUTH_SIGNUP_WINDOW_SECONDS || '60' }}
  RATE_LIMIT_OAUTH_START_MAX: ${{ vars.RATE_LIMIT_OAUTH_START_MAX || '12' }}
  RATE_LIMIT_OAUTH_START_WINDOW_SECONDS: ${{ vars.RATE_LIMIT_OAUTH_START_WINDOW_SECONDS || '60' }}
  RATE_LIMIT_POST_WRITE_MAX: ${{ vars.RATE_LIMIT_POST_WRITE_MAX || '40' }}
  RATE_LIMIT_POST_WRITE_WINDOW_SECONDS: ${{ vars.RATE_LIMIT_POST_WRITE_WINDOW_SECONDS || '60' }}
  RATE_LIMIT_POST_PUBLISH_QUEUE_MAX: ${{ vars.RATE_LIMIT_POST_PUBLISH_QUEUE_MAX || '20' }}
  RATE_LIMIT_POST_PUBLISH_QUEUE_WINDOW_SECONDS: ${{ vars.RATE_LIMIT_POST_PUBLISH_QUEUE_WINDOW_SECONDS || '60' }}
  RATE_LIMIT_MEDIA_WRITE_MAX: ${{ vars.RATE_LIMIT_MEDIA_WRITE_MAX || '30' }}
  RATE_LIMIT_MEDIA_WRITE_WINDOW_SECONDS: ${{ vars.RATE_LIMIT_MEDIA_WRITE_WINDOW_SECONDS || '60' }}
  PRELAUNCH_REQUIRE_REAL_ALERT_TARGETS: ${{ vars.PRELAUNCH_REQUIRE_REAL_ALERT_TARGETS || 'false' }}
  PRELAUNCH_REQUIRE_DRILL_EVIDENCE: ${{ vars.PRELAUNCH_REQUIRE_DRILL_EVIDENCE || 'false' }}

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Dependency Audit (Fail on Critical)
        run: npm audit --audit-level=critical

      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Integration Tests
        run: npm test

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: E2E Tests
        run: npm run test:e2e

  integration-db:
    name: Integration DB
    runs-on: ubuntu-latest
    needs: quality
    env:
      TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve DB Test Env Availability
        id: db_env
        run: |
          if [[ -n "${TEST_SUPABASE_URL}" && -n "${TEST_SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "run_db_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_db_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip DB Integration Tests (Missing Secrets)
        if: ${{ steps.db_env.outputs.run_db_tests != 'true' }}
        run: echo "Skipping DB integration tests because TEST_SUPABASE_URL/TEST_SUPABASE_SERVICE_ROLE_KEY are not configured."

      - name: Setup Node
        if: ${{ steps.db_env.outputs.run_db_tests == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        if: ${{ steps.db_env.outputs.run_db_tests == 'true' }}
        run: npm ci

      - name: DB Integration Tests
        if: ${{ steps.db_env.outputs.run_db_tests == 'true' }}
        run: npm run test:integration:db

  prelaunch-checklist:
    name: Prelaunch Checklist
    runs-on: ubuntu-latest
    needs: [security, quality, e2e, integration-db]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Prelaunch Checklist Automation
        run: npm run check:prelaunch
